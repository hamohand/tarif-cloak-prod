server {
  listen 80;
  server_name localhost;

  # Chemin vers les fichiers statiques d'Angular
  root /usr/share/nginx/html;
  index index.html;

  # Servir les fichiers statiques directement
  location / {
    # Pour la navigation de la SPA, renvoyer vers index.html si le fichier n'est pas trouvé
    try_files $uri $uri/ /index.html;
  }

  # --- PROXY POUR LE SEARCH-SERVICE (priorité haute, avant /api/) ---
  location /api/recherche {
    proxy_pass http://search-service:8082/recherche;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/batch-search {
    proxy_pass http://search-service:8082/batch-search;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- PROXY POUR LE BACKEND ---
  # Le "/" final sur proxy_pass supprime le préfixe /api/ (comme Traefik en prod)
  location /api/ {
    proxy_pass http://backend:8081/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
